<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מעקב קרנות נאמנות</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        :root {
            --bg: #0a0e17;
            --surface: #111827;
            --surface2: #1a2235;
            --border: #1f2d44;
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --green: #00e676;
            --red: #ff1744;
            --yellow: #f59e0b;
            --text: #e2e8f0;
            --text-dim: #64748b;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Heebo', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--sans);
            background: var(--bg); color: var(--text);
            min-height: 100vh; padding: 24px 16px;
            background-image:
                radial-gradient(ellipse at 10% 0%, rgba(0,212,255,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 100%, rgba(124,58,237,0.06) 0%, transparent 50%);
        }
        .container { max-width: 900px; margin: 0 auto; }

        .header {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 28px; padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .header-right { display: flex; align-items: center; gap: 14px; flex: 1; }
        .header-left {
            display: flex; align-items: center; gap: 10px;
            margin-right: auto;
        }
        .sync-status {
            font-size: 11px; font-family: var(--mono);
            color: var(--text-dim);
            display: flex; align-items: center; gap: 5px;
        }
        .sync-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--text-dim); flex-shrink: 0;
        }
        .sync-dot.ok { background: var(--green); }
        .sync-dot.err { background: var(--red); }
        .sync-dot.loading { background: var(--yellow); animation: pulse 1s infinite; }
        .logout-btn {
            background: transparent !important;
            color: var(--text-dim) !important;
            border: 1px solid var(--border) !important;
            padding: 5px 10px !important;
            font-size: 11px !important;
            border-radius: 6px !important;
            font-family: var(--mono) !important;
            cursor: pointer;
            white-space: nowrap;
        }
        .logout-btn:hover { color: var(--red) !important; border-color: var(--red) !important; }
        .header-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--yellow), #ef4444);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .header h1 { font-size: 1.5rem; font-weight: 700; }
        .header .subtitle { font-size: 0.8rem; color: var(--text-dim); font-family: var(--mono); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .error-msg {
            background: rgba(255,23,68,0.1); border: 1px solid rgba(255,23,68,0.3);
            color: #ff6b8a; padding: 12px 16px; border-radius: 8px;
            margin-bottom: 16px; font-size: 14px; display: none;
        }
        .info-msg {
            background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.3);
            color: var(--green); padding: 12px 16px; border-radius: 8px;
            margin-bottom: 16px; font-size: 14px; display: none;
        }

        .section {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 20px;
        }
        .section h2 { font-size: 14px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

        .fund-preset-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .fund-preset {
            padding: 6px 14px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 20px;
            font-size: 12px; color: var(--text-dim);
            cursor: pointer; transition: all 0.15s; font-family: var(--sans);
        }
        .fund-preset:hover, .fund-preset.selected {
            border-color: var(--yellow); color: var(--yellow);
            background: rgba(245,158,11,0.08);
        }

        .add-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 500px) { .add-form { grid-template-columns: 1fr; } }
        .add-form .full { grid-column: 1 / -1; }

        input[type="text"], input[type="number"] {
            width: 100%; padding: 11px 14px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text);
            font-size: 14px; font-family: var(--sans); transition: border-color 0.2s;
        }
        input::placeholder { color: var(--text-dim); }
        input:focus { outline: none; border-color: var(--yellow); box-shadow: 0 0 0 3px rgba(245,158,11,0.08); }

        button {
            padding: 11px 20px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            font-family: var(--sans); white-space: nowrap;
        }
        button:hover { opacity: 0.85; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        button.success { background: var(--green); color: #000; }
        button.danger { background: var(--red); color: #fff; }
        button.update-btn { background: var(--accent); color: #000; }
        button.chart-btn { background: var(--accent2); color: #fff; }
        button.sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }

        .fund-item {
            background: var(--surface2); border: 1px solid var(--border);
            border-right: 3px solid var(--yellow);
            padding: 16px; border-radius: 8px; margin-bottom: 10px;
        }
        .fund-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .fund-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
        .fund-meta { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
        .fund-actions-top { display: flex; gap: 6px; }

        .fund-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
        .stat-label { font-size: 10px; color: var(--text-dim); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
        .stat-value { font-size: 16px; font-weight: 700; font-family: var(--mono); }
        .stat-value.accent { color: var(--accent); }
        .stat-value.green { color: var(--green); }
        .stat-value.red { color: var(--red); }

        .fund-update {
            display: flex; gap: 8px; align-items: center;
            padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap;
        }
        .fund-update input { flex: 1; min-width: 120px; max-width: 160px; }
        .update-hint { font-size: 11px; color: var(--text-dim); }

        .summary-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; margin-top: 16px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px;
        }
        .s-label { font-size: 10px; color: var(--text-dim); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
        .s-value { font-size: 20px; font-weight: 700; font-family: var(--mono); }

        .empty-state { text-align: center; color: var(--text-dim); font-size: 13px; padding: 24px 0; }
        .last-update { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-top: 2px; }

        /* Chart modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 100;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 20px;
            width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .modal-title { font-size: 15px; font-weight: 700; }
        #chartDiv { height: 320px; }

        .loading { text-align: center; color: var(--text-dim); padding: 20px; font-size: 13px; }
    </style>
</head>
<body>
<!-- Login Screen -->
<div id="loginScreen" style="display:flex; min-height:100vh; align-items:center; justify-content:center; flex-direction:column; gap:20px; text-align:center;">
    <div style="font-size:48px">🏦</div>
    <h2 style="font-size:1.4rem; font-weight:700">קרנות נאמנות</h2>
    <p style="color:var(--text-dim); font-size:14px">אנא התחבר כדי לגשת לנתונים</p>
    <button onclick="googleLogin()" style="background:white; color:#333; display:flex; align-items:center; gap:10px; padding:14px 24px; border-radius:10px; font-size:15px; font-weight:600; border:none; cursor:pointer; box-shadow:0 2px 12px rgba(0,0,0,0.3)">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">
        התחבר עם Google
    </button>
</div>

<!-- App Screen -->
<div id="appScreen" style="display:none">
<div class="container">

    <div class="header">
        <div class="header-right">
            <div class="header-icon">🏦</div>
            <div>
                <h1>קרנות נאמנות</h1>
                <div class="subtitle">עדכון ידני · היסטוריה</div>
            </div>
        </div>
        <div class="header-left">
            <div class="sync-status">
                <div class="sync-dot" id="syncDot"></div>
                <span id="syncText">מתחבר...</span>
            </div>
            <button class="logout-btn" onclick="logout()">
                יציאה ↩
            </button>
        </div>
    </div>

    <div id="errorMsg" class="error-msg"></div>
    <div id="infoMsg" class="info-msg"></div>

    <!-- Summary bar -->
    <div class="summary-grid" id="fundSummary" style="display:none; margin-bottom:20px">
        <div>
            <div class="s-label">ערך נוכחי</div>
            <div class="s-value" id="totalValue">₪0</div>
        </div>
        <div>
            <div class="s-label">השקעה</div>
            <div class="s-value" id="totalInvested">₪0</div>
        </div>
    </div>

    <!-- Fund List -->
    <div class="section">
        <h2>📊 הקרנות שלי</h2>
        <div id="fundList"><div class="loading">טוען נתונים מ-Firebase...</div></div>
    </div>

    <!-- Add Fund -->
    <div class="section">
        <h2>➕ הוסף קרן</h2>
        <div class="fund-preset-list" id="fundPresets"></div>
        <div class="add-form">
            <input type="text" id="fundNumber" placeholder="מספר קרן (7 ספרות)">
            <input type="text" id="fundName" placeholder="שם הקרן">
            <input type="number" id="fundUnits" placeholder="כמות יחידות (למשל: 81.26)" step="any" min="0">
            <input type="number" id="fundBuyPrice" placeholder="מחיר קנייה ליחידה (₪)" step="any" min="0">
            <button class="success full" id="addBtn" onclick="addFund()">+ הוסף קרן</button>
        </div>
    </div>

</div><!-- /container -->
</div><!-- /appScreen -->

<!-- Chart Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">היסטוריית מחירים</div>
            <button class="danger sm" onclick="closeChartModal()">✕ סגור</button>
        </div>
        <div id="chartDiv"></div>
        <div id="historyTable" style="margin-top:14px"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, addDoc, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const ALLOWED_EMAIL = 'yaron.zlotolov@gmail.com';

const firebaseConfig = {
    apiKey: "AIzaSyAnmz73-U2s7HBg2fuZsyoWLeMnweiUgek",
    authDomain: "market-6171e.firebaseapp.com",
    projectId: "market-6171e",
    storageBucket: "market-6171e.firebasestorage.app",
    messagingSenderId: "414425507433",
    appId: "1:414425507433:web:802a3272b1db21762da4f8",
    measurementId: "G-D4J30CZG4F"
};

const app      = initializeApp(firebaseConfig);
const db       = getFirestore(app);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();

const FUNDS_COL   = 'funds';
const HISTORY_COL = 'priceHistory';

// ── Auth UI ───────────────────────────────────────────
const loginScreen = document.getElementById('loginScreen');
const appScreen   = document.getElementById('appScreen');

window.googleLogin = async function() {
    try {
        const result = await signInWithPopup(auth, provider);
        if (result.user.email !== ALLOWED_EMAIL) {
            await signOut(auth);
            showError('גישה מותרת רק לחשבון המורשה');
        }
    } catch(e) {
        showError('שגיאת התחברות: ' + e.message);
    }
};

window.logout = async function() {
    await signOut(auth);
};

onAuthStateChanged(auth, user => {
    if (user && user.email === ALLOWED_EMAIL) {
        loginScreen.style.display = 'none';
        appScreen.style.display   = 'block';
        document.getElementById('userEmail').textContent = user.email;
        startListening();
    } else {
        loginScreen.style.display = 'flex';
        appScreen.style.display   = 'none';
        funds = {};
    }
});

let unsubscribe = null;
function startListening() {
    if (unsubscribe) unsubscribe();
    setSyncStatus('loading', 'מתחבר...');
    unsubscribe = onSnapshot(collection(db, FUNDS_COL), snap => {
        funds = {};
        snap.forEach(d => funds[d.id] = { id: d.id, ...d.data() });
        setSyncStatus('ok', 'מסונכרן');
        renderFunds();
    }, err => {
        setSyncStatus('err', 'שגיאת חיבור');
        showError('שגיאת Firebase: ' + err.message);
    });
}

// ── Presets ───────────────────────────────────────────
const FUND_PRESETS = [
    { number: '5125679', name: 'סיגמא גמישה' },
    { number: '5120613', name: 'סיגמא מניות ישראל' },
    { number: '5115514', name: 'סיגמא מדינה 20%+' },
    { number: '5114632', name: 'אי.בי.אי. מדינה 10%+' },
    { number: '5131644', name: 'אי.בי.אי. NASDAQ 100' },
    { number: '5107420', name: 'אי.בי.אי. 20/80' },
    { number: '5116033', name: 'אנליסט 20/80' },
    { number: '5121090', name: 'מור מדדית מדינה 20%+' },
    { number: '5134028', name: 'מיטב 25/75' },
    { number: '5125794', name: 'אילים 20/80' },
    { number: '5135074', name: 'תכלית PHLX Semiconductor' },
];

document.getElementById('fundPresets').innerHTML = FUND_PRESETS.map(f =>
    `<button class="fund-preset" data-number="${f.number}" data-name="${escHtml(f.name)}" onclick="selectPreset(this)">${escHtml(f.name)}</button>`
).join('');

window.selectPreset = function(btn) {
    document.getElementById('fundNumber').value = btn.dataset.number;
    document.getElementById('fundName').value   = btn.dataset.name;
    document.querySelectorAll('.fund-preset').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('fundUnits').focus();
};

// ── Sync indicator ────────────────────────────────────
function setSyncStatus(state, text) {
    const dot  = document.getElementById('syncDot');
    const span = document.getElementById('syncText');
    dot.className  = 'sync-dot ' + state;
    span.textContent = text;
}

let funds = {};

// ── Add fund ──────────────────────────────────────────
window.addFund = async function() {
    const number   = document.getElementById('fundNumber').value.trim();
    const name     = document.getElementById('fundName').value.trim();
    const units    = parseFloat(document.getElementById('fundUnits').value);
    const buyPrice = parseFloat(document.getElementById('fundBuyPrice').value);

    if (!number || !name) return showError('אנא הכנס מספר קרן ושם');
    if (isNaN(units) || units <= 0) return showError('אנא הכנס כמות יחידות תקינה');
    if (isNaN(buyPrice) || buyPrice <= 0) return showError('אנא הכנס מחיר קנייה תקין');

    const btn = document.getElementById('addBtn');
    btn.disabled = true;

    try {
        const existing = Object.values(funds).find(f => f.number === number);
        if (existing) {
            const newInvested    = existing.totalInvested + units * buyPrice;
            const newUnits       = existing.units + units;
            const newBuyPrice    = newInvested / newUnits;
            const newCurrentVal  = existing.currentPrice * newUnits;
            await setDoc(doc(db, FUNDS_COL, existing.id), {
                ...existing,
                units: newUnits,
                buyPrice: newBuyPrice,
                totalInvested: newInvested,
                currentValue: newCurrentVal,
                profit: newCurrentVal - newInvested,
                profitPercent: ((newCurrentVal - newInvested) / newInvested) * 100
            });
            showInfo(`✅ נוספו יחידות ל-${name}`);
        } else {
            const id = number;
            await setDoc(doc(db, FUNDS_COL, id), {
                number, name, units, buyPrice,
                totalInvested: units * buyPrice,
                currentPrice: buyPrice,
                currentValue: units * buyPrice,
                profit: 0, profitPercent: 0,
                lastUpdated: null, createdAt: new Date().toISOString()
            });
            showInfo(`✅ ${name} נוספה`);
        }
        clearForm();
    } catch(e) {
        showError('שגיאה בשמירה: ' + e.message);
    } finally {
        btn.disabled = false;
    }
};

// ── Update price ──────────────────────────────────────
window.updatePrice = async function(id) {
    const input    = document.getElementById('price_' + id);
    const newPrice = parseFloat(input.value);
    if (isNaN(newPrice) || newPrice <= 0) return showError('מחיר לא תקין');

    const fund = funds[id];
    if (!fund) return;

    const newValue   = newPrice * fund.units;
    const profit     = newValue - fund.totalInvested;
    const profitPct  = (profit / fund.totalInvested) * 100;
    const now        = new Date().toISOString();
    const nowDisplay = new Date().toLocaleString('he-IL');

    try {
        // Update fund doc
        await setDoc(doc(db, FUNDS_COL, id), {
            ...fund,
            currentPrice: newPrice,
            currentValue: newValue,
            profit, profitPercent: profitPct,
            lastUpdated: nowDisplay
        });

        // Save to price history subcollection
        await addDoc(collection(db, FUNDS_COL, id, HISTORY_COL), {
            price: newPrice,
            value: newValue,
            profit, profitPercent: profitPct,
            timestamp: now,
            dateDisplay: nowDisplay
        });

        showInfo(`✅ ${fund.name} עודכן ל-₪${newPrice.toFixed(2)}`);
    } catch(e) {
        showError('שגיאה בעדכון: ' + e.message);
    }
};

// ── Remove fund ───────────────────────────────────────
window.removeFund = async function(id) {
    if (!confirm('למחוק את הקרן?')) return;
    try {
        await deleteDoc(doc(db, FUNDS_COL, id));
    } catch(e) {
        showError('שגיאה במחיקה: ' + e.message);
    }
};

// ── Show chart ────────────────────────────────────────
window.showChart = async function(id) {
    const fund = funds[id];
    if (!fund) return;

    document.getElementById('modalTitle').textContent = `📈 ${fund.name} — היסטוריית מחירים`;
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('chartDiv').innerHTML = '<div class="loading">טוען היסטוריה...</div>';
    document.getElementById('historyTable').innerHTML = '';

    try {
        const q    = query(collection(db, FUNDS_COL, id, HISTORY_COL), orderBy('timestamp'));
        const snap = await getDocs(q);

        if (snap.empty) {
            document.getElementById('chartDiv').innerHTML = '<div class="loading">אין היסטוריה עדיין — עדכן מחיר כדי להתחיל</div>';
            return;
        }

        const dates  = [], prices = [], values = [], profits = [];
        snap.forEach(d => {
            const h = d.data();
            dates.push(h.dateDisplay);
            prices.push(h.price);
            values.push(h.value);
            profits.push(h.profitPercent);
        });

        Plotly.newPlot('chartDiv', [
            { x: dates, y: prices, type: 'scatter', mode: 'lines+markers', name: 'מחיר יחידה (₪)', line: { color: '#00d4ff', width: 2 }, marker: { size: 6 } },
            { x: dates, y: values, type: 'scatter', mode: 'lines+markers', name: 'ערך כולל (₪)', line: { color: '#00e676', width: 2 }, marker: { size: 6 }, yaxis: 'y2' }
        ], {
            paper_bgcolor: '#111827', plot_bgcolor: '#111827',
            font: { family: 'IBM Plex Mono', color: '#e2e8f0', size: 11 },
            xaxis: { color: '#64748b', gridcolor: '#1f2d44' },
            yaxis: { title: 'מחיר יחידה', color: '#64748b', gridcolor: '#1f2d44' },
            yaxis2: { title: 'ערך כולל', overlaying: 'y', side: 'left', color: '#64748b' },
            legend: { bgcolor: 'transparent' },
            margin: { l: 60, r: 20, t: 20, b: 60 },
            height: 300
        }, { responsive: true, displayModeBar: false });

        // History table
        const rows = [...snap.docs].reverse().slice(0, 10).map(d => {
            const h = d.data();
            const sign = h.profitPercent >= 0 ? '+' : '';
            const color = h.profitPercent >= 0 ? 'var(--green)' : 'var(--red)';
            return `<tr>
                <td style="color:var(--text-dim);font-size:12px">${h.dateDisplay}</td>
                <td style="font-family:var(--mono)">₪${h.price.toFixed(2)}</td>
                <td style="font-family:var(--mono)">₪${fmt(h.value)}</td>
                <td style="font-family:var(--mono);color:${color}">${sign}${h.profitPercent.toFixed(2)}%</td>
            </tr>`;
        }).join('');

        document.getElementById('historyTable').innerHTML = `
            <table style="width:100%;border-collapse:collapse;font-size:13px">
                <thead><tr style="color:var(--text-dim);font-size:11px;font-family:var(--mono)">
                    <th style="text-align:right;padding:6px 4px">תאריך</th>
                    <th style="text-align:right;padding:6px 4px">מחיר יחידה</th>
                    <th style="text-align:right;padding:6px 4px">ערך כולל</th>
                    <th style="text-align:right;padding:6px 4px">תשואה</th>
                </tr></thead>
                <tbody>${rows}</tbody>
            </table>`;

    } catch(e) {
        document.getElementById('chartDiv').innerHTML = '<div class="loading">שגיאה בטעינת היסטוריה</div>';
    }
};

window.closeChartModal = function() {
    document.getElementById('modalOverlay').classList.remove('open');
    Plotly.purge('chartDiv');
};
window.closeModal = function(e) {
    if (e.target === document.getElementById('modalOverlay')) window.closeChartModal();
};

// ── Render ────────────────────────────────────────────
function renderFunds() {
    const list    = document.getElementById('fundList');
    const summary = document.getElementById('fundSummary');
    const arr     = Object.values(funds);

    if (arr.length === 0) {
        list.innerHTML = '<p class="empty-state">אין קרנות — הוסף קרן למעלה</p>';
        summary.style.display = 'none';
        return;
    }

    let totalValue = 0, totalInvested = 0;

    list.innerHTML = arr.map(f => {
        totalValue    += f.currentValue;
        totalInvested += f.totalInvested;

        const pClass = f.profit >= 0 ? 'green' : 'red';
        const pSign  = f.profit >= 0 ? '+' : '';
        const lastUpd = f.lastUpdated || 'טרם עודכן';

        return `<div class="fund-item">
            <div class="fund-header">
                <div>
                    <div class="fund-name">${escHtml(f.name)}</div>
                    <div class="fund-meta">מס׳ ${f.number} · ${f.units} יחידות @ ₪${f.buyPrice.toFixed(2)}</div>
                    <div class="last-update">${lastUpd}</div>
                </div>
                <div class="fund-actions-top">
                    <button class="chart-btn sm" onclick="showChart('${f.id}')">📈 גרף</button>
                    <button class="danger sm" onclick="removeFund('${f.id}')">⨉</button>
                </div>
            </div>
            <div class="fund-stats">
                <div>
                    <div class="stat-label">ערך נוכחי</div>
                    <div class="stat-value accent">₪${fmt(f.currentValue)}</div>
                </div>
                <div>
                    <div class="stat-label">השקעה</div>
                    <div class="stat-value">₪${fmt(f.totalInvested)}</div>
                </div>
                <div>
                    <div class="stat-label">רווח/הפסד</div>
                    <div class="stat-value ${pClass}">${pSign}₪${fmt(f.profit)}<br><span style="font-size:12px">${pSign}${f.profitPercent.toFixed(2)}%</span></div>
                </div>
            </div>
            <div class="fund-update">
                <input type="number" id="price_${f.id}" value="${f.currentPrice.toFixed(2)}" step="any" placeholder="מחיר יחידה חדש">
                <button class="update-btn sm" onclick="updatePrice('${f.id}')">עדכן מחיר</button>
                <span class="update-hint">מחיר ממיטב →</span>
            </div>
        </div>`;
    }).join('');

    summary.style.display = 'grid';
    document.getElementById('totalValue').textContent    = `₪${fmt(totalValue)}`;
    document.getElementById('totalInvested').textContent = `₪${fmt(totalInvested)}`;
}

// ── Helpers ───────────────────────────────────────────
function clearForm() {
    ['fundNumber','fundName','fundUnits','fundBuyPrice'].forEach(id => document.getElementById(id).value = '');
    document.querySelectorAll('.fund-preset').forEach(b => b.classList.remove('selected'));
}
function fmt(n) { return Math.abs(n).toLocaleString('he-IL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = 'block';
    clearTimeout(showError._t);
    showError._t = setTimeout(() => el.style.display = 'none', 6000);
}
function showInfo(msg) {
    const el = document.getElementById('infoMsg');
    el.textContent = msg; el.style.display = 'block';
    clearTimeout(showInfo._t);
    showInfo._t = setTimeout(() => el.style.display = 'none', 4000);
}
</script>
</body>
</html>
